name: Feature Request
description: Suggest new behaviour or an API addition
labels: [enhancement]

body:
  - type: markdown
    attributes:
      value: |
        Before opening a feature request, please search existing issues and discussions to avoid duplicates.

  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-flight checklist
      options:
        - label: I searched existing issues and this has not been requested before
          required: true
        - label: This is within the scope of OpenBridge (local-first, plugin-based home automation bridge)
          required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of OpenBridge does this relate to?
      options:
        - Daemon / HTTP API
        - Plugin lifecycle / SDK
        - HAP bridge / Apple Home
        - Homebridge compatibility
        - Dashboard UI
        - Config schema
        - Logger
        - Docker / deployment
        - CLI
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this solve, or what workflow does it enable?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the behaviour, API, or UI change you would like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you tried working around this? What other approaches did you consider?

  - type: textarea
    id: context
    attributes:
      label: Additional context
