services:
  openbridge:
    image: ghcr.io/nubisco/openbridge:latest
    pull_policy: always
    container_name: openbridge
    restart: unless-stopped
    # Host networking is required for:
    # - mDNS device discovery (Shelly, Tuya UDP broadcast)
    # - WebSocket connections to smart devices (Shelly gen2)
    # - HomeKit (HAP) bridge advertisement on the local network
    network_mode: host
    volumes:
      # Persistent config and pairing data
      - openbridge-config:/root/.openbridge
      # Plugin directory — npm packages installed here by the UI marketplace
      - openbridge-plugins:/plugins
      # App directory — enables self-updates from the UI
      - openbridge-app:/opt/openbridge
    environment:
      TZ: Europe/Lisbon
      NODE_ENV: production
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:8582/api/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  openbridge-config:
  openbridge-plugins:
  openbridge-app:
