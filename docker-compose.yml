services:
  openbridge:
    image: ghcr.io/nubisco/openbridge:latest
    container_name: openbridge
    restart: unless-stopped
    ports:
      - '8581:8581'
    volumes:
      # Persistent config and pairing data
      - openbridge-config:/root/.openbridge
      # Plugin directory — npm packages installed here by the UI marketplace
      - openbridge-plugins:/plugins
    environment:
      TZ: Europe/Lisbon
      NODE_ENV: production
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:8581/api/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # Optional: uncomment to enable automatic image updates (checks daily)
  # watchtower:
  #   image: containrrr/watchtower
  #   container_name: openbridge-watchtower
  #   restart: unless-stopped
  #   volumes:
  #     - /var/run/docker.sock:/var/run/docker.sock
  #   command: --interval 86400 --cleanup openbridge

volumes:
  openbridge-config:
  openbridge-plugins:
